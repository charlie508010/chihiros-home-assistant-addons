<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chihiros Beta</title>
    <script type="module" src="./www/chihiros-doser-card-v3.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --primary-background-color: #071011;
        --primary-text-color: #e8eef0;
        --secondary-text-color: #9dadb2;
        --divider-color: rgba(255, 255, 255, .12);
        --card-background-color: #0c1a1d;
        --accent-color: #03c9ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--primary-background-color);
        color: var(--primary-text-color);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 4;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        background: #1f1f1f;
        border-bottom: 1px solid rgba(255, 255, 255, .08);
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }
      header .version {
        color: var(--secondary-text-color);
        font-size: 12px;
      }
      header .status {
        margin-left: auto;
        color: #65d46e;
        font-weight: 700;
      }
      main {
        width: min(1480px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 12px 0 28px;
      }
      .error {
        margin: 16px auto;
        width: min(860px, calc(100vw - 24px));
        border: 1px solid rgba(255, 77, 79, .7);
        border-radius: 8px;
        background: rgba(75, 0, 0, .28);
        padding: 14px;
        color: #ffd8d8;
        white-space: pre-wrap;
      }
      .ctl-device-bar {
        display: grid;
        grid-template-columns: auto minmax(180px, 320px) 64px;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
      }
      .ctl-device-bar label {
        color: var(--secondary-text-color);
        font-weight: 700;
      }
      .ctl-device-bar input {
        min-height: 34px;
        border: 1px solid rgba(81,154,190,.35);
        border-radius: 6px;
        background: rgba(255,255,255,.08);
        color: var(--primary-text-color);
        padding: 0 10px;
        font: inherit;
      }
      .ctl-device-bar button {
        min-height: 34px;
        border: 1px solid rgba(3,201,255,.65);
        border-radius: 6px;
        background: rgba(0,122,166,.18);
        color: var(--primary-text-color);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Chihiros Beta</h1>
      <span class="version">Add-on Dashboard</span>
      <span id="status" class="status">verbinde...</span>
    </header>
    <main>
      <div class="ctl-device-bar">
        <label for="ctl-device">CTL Geraet</label>
        <input id="ctl-device" type="text" value="doser_1" spellcheck="false">
        <button id="ctl-device-save" type="button">OK</button>
      </div>
      <chihiros-doser-card-v3 id="dashboard"></chihiros-doser-card-v3>
      <div id="error" class="error" hidden></div>
    </main>
    <script type="module">
      class HaIcon extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = this.attachShadow({ mode: "open" });
          root.innerHTML = `<style>:host{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;color:currentColor}</style><span></span>`;
        }
      }
      if (!customElements.get("ha-icon")) customElements.define("ha-icon", HaIcon);

      const status = document.getElementById("status");
      const error = document.getElementById("error");
      const dashboard = document.getElementById("dashboard");
      const ctlDevice = document.getElementById("ctl-device");
      const ctlDeviceSave = document.getElementById("ctl-device-save");

      function currentCtlDevice() {
        return (ctlDevice && ctlDevice.value ? ctlDevice.value.trim() : "") || "doser_1";
      }

      function resolveCtlCommand(command) {
        let resolved = String(command || "").replaceAll("{device}", currentCtlDevice());
        const parts = resolved.trim().split(/\s+/);
        if (parts.length === 3 && parts[0] === "chihirosctl" && parts[1] === "doser" && parts[2] !== "gui") {
          resolved = `${resolved} ${currentCtlDevice()}`;
        }
        return resolved;
      }

      function saveCtlDevice() {
        if (!ctlDevice) return;
        ctlDevice.value = currentCtlDevice();
        dashboard.ctlDevice = ctlDevice.value;
      }

      if (ctlDevice) {
        ctlDevice.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") saveCtlDevice();
        });
        ctlDevice.addEventListener("change", saveCtlDevice);
      }
      if (ctlDeviceSave) ctlDeviceSave.addEventListener("click", saveCtlDevice);

      const CardClass = customElements.get("chihiros-doser-card-v3");
      if (CardClass && !CardClass.prototype._addonCtlPatched) {
        CardClass.prototype._addonCtlPatched = true;
        CardClass.prototype.copyCtlCommand = async function(command) {
          const channel = this.channels && this.channels[0] ? this.channels[0].id : 1;
          const resolvedCommand = resolveCtlCommand(this.resolveCtlCommand ? this.resolveCtlCommand(command) : command);
          this.dialogState = {
            type: "debug",
            channel,
            output: `RUN\n${resolvedCommand}`,
            running: true,
          };
          this.render();
          try {
            const response = await fetch("./api/ctl", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ command: resolvedCommand }),
            });
            const data = await response.json();
            this.dialogState = {
              type: "debug",
              channel,
              output: `${response.ok ? "OK" : "FAIL"}\n${resolvedCommand}\n\n${data.output || data.message || ""}`,
              running: false,
              level: response.ok ? undefined : "error",
            };
          } catch (err) {
            this.dialogState = {
              type: "debug",
              channel,
              output: `FAIL\n${resolvedCommand}\n\n${err && err.message ? err.message : String(err)}`,
              running: false,
              level: "error",
            };
          }
          this.render();
        };
      }

      const hass = {
        states: {},
        language: "de",
        locale: { language: "de" },
        localize: (key) => key,
        callService: async (domain, service, data, _target, _notify, returnResponse) => {
          const response = await fetch(`./api/services/${domain}/${service}${returnResponse ? "?return_response=1" : ""}`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(data || {}),
          });
          const text = await response.text();
          let body = {};
          if (text) {
            try { body = JSON.parse(text); } catch (_err) { body = { output: text }; }
          }
          if (!response.ok) throw new Error(body.message || text || `Service ${domain}.${service} failed`);
          await refreshStates();
          return body;
        },
        connection: {
          sendMessagePromise: async (message) => {
            if (!message || message.type !== "call_service") return {};
            return hass.callService(message.domain, message.service, message.service_data || {}, undefined, true, Boolean(message.return_response));
          },
        },
      };

      function mapStates(list) {
        const states = {};
        for (const item of Array.isArray(list) ? list : []) {
          if (item && item.entity_id) states[item.entity_id] = item;
        }
        return states;
      }

      async function refreshStates() {
        const response = await fetch("./api/states", { cache: "no-store" });
        const text = await response.text();
        if (!response.ok) throw new Error(text || "States konnten nicht geladen werden");
        hass.states = mapStates(JSON.parse(text));
        dashboard.hass = hass;
        status.textContent = "online";
      }

      dashboard.setConfig({
        default_tab: "doser",
        show_mac: true,
      });

      async function tick() {
        try {
          error.hidden = true;
          await refreshStates();
        } catch (err) {
          status.textContent = "Fehler";
          error.hidden = false;
          error.textContent = err && err.message ? err.message : String(err);
        }
      }

      await tick();
      window.setInterval(tick, 5000);
    </script>
  </body>
</html>
