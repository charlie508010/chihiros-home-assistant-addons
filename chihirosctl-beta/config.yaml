name: Chihiros CTL Beta
version: "0.1.0"
slug: chihirosctl_beta
description: Beta Chihiros CTL helper container for Home Assistant
url: https://github.com/charlie508010/chihiros-home-assistant-addons/tree/main/chihirosctl-beta
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
  armhf: ghcr.io/home-assistant/armhf-base:latest
  armv7: ghcr.io/home-assistant/armv7-base:latest
  i386: ghcr.io/home-assistant/i386-base:latest
startup: services
boot: manual
init: false
host_network: true
host_dbus: true
map:
  - config:rw
options:
  source_repository: https://github.com/charlie508010/chihiros-led-control-beta.git
  source_branch: main
  install_integration: true
  keep_running: true
schema:
  source_repository: str
  source_branch: str
  install_integration: bool
  keep_running: bool
panel_icon: mdi:console
panel_title: Chihiros CTL Beta
